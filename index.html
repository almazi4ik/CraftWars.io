<!DOCTYPE html>
<html>
<head>
    <title>CraftWars.io</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        #menu { position: absolute; text-align: center; color: white; background: rgba(0,0,0,0.8); padding: 30px; border-radius: 10px; z-index: 100; }
        input { padding: 10px; font-size: 16px; border-radius: 5px; border: none; width: 200px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #0f0; border: none; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="menu">
        <h1>CraftWars.io</h1>
        <input type="text" id="nickname" placeholder="Твой ник..." maxlength="12"><br>
        <button onclick="startGame()">ИГРАТЬ</button>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js"></script>
    <script>
        function startGame() {
            let nick = document.getElementById('nickname').value;
            if (nick.length > 0) {
                document.getElementById('menu').style.display = 'none';
                window.playerNickname = nick; // Передаем ник в игру
                game.scene.start('Game');
            } else {
                alert("Введите ник!");
            }
        }
    </script>
</body>
</html>
